name: 网络诊断雷达
description: 基于 Network-Pro.js 的 Egern 小组件模块，增加本地运营商显示并适配大号小组件。
author: SchweppesSoda
homepage: https://github.com/SchweppesSoda/CustomRules
icon: waveform.path.ecg

env_schema:
  RADAR_LAYOUT:
    name: 显示布局
    description: auto 自动识别小组件尺寸；large 强制大号布局；medium 强制中号布局。
    default_value: auto
    options:
      - auto
      - large
      - medium

scriptings:
  - generic:
      name: 网络诊断雷达
      script_url: https://raw.githubusercontent.com/SchweppesSoda/CustomRules/refs/heads/master/Egern/Modules/NetworkRadar.js?v=20260617-0404
      update_interval: 300
      timeout: 20

widgets:
  - name: 网络诊断雷达
    script_name: 网络诊断雷达
